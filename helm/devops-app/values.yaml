# ─── API ─────────────────────────────────────────────────
api:
  image:
    repository: abhinabh/devops-api
    tag: latest
  replicas: 2
  port: 3000
  nodePort: 30000

# ─── PostgreSQL ───────────────────────────────────────────
postgres:
  image: postgres:15-alpine
  replicas: 1
  database: devops_db
  username: admin
  password: secret123
  port: 5432

# ─── Redis ────────────────────────────────────────────────
redis:
  image: redis:7-alpine
  replicas: 1
  port: 6379

# ─── Namespace ────────────────────────────────────────────
namespace: devops-app

# ─── Environment ──────────────────────────────────────────
environment: production
