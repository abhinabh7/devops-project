name: CI Pipeline

# WHEN does this run?
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# WHAT does it do?
jobs:

  # ─── Job 1: Test ─────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start services with Docker Compose
        run: docker compose up -d --build
        
      - name: Wait for services to be healthy
        run: |
          echo "Waiting for API to be ready..."
          for i in $(seq 1 30); do
            if curl -f http://localhost:3000/health 2>/dev/null; then
              echo "API is ready!"
              break
            fi
            echo "Attempt $i: API not ready yet, waiting..."
            sleep 3
          done

      - name: Run API tests
        run: |
          cd api
          npm install
          npm test

      - name: Show logs if tests fail
        if: failure()
        run: docker compose logs

      - name: Stop services
        if: always()
        run: docker compose down -v

  # ─── Job 2: Build & Push Docker Image ────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test        # only runs if test job passes

    # only push image on main branch, not on PRs
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-api:${{ github.sha }}
